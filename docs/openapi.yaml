openapi: 3.0.3
info:
  title: ProdBuddy Backend API
  version: 1.0.0
  description: API per integrazioni, credenziali e metriche DORA
servers:
  - url: http://localhost:3000
paths:
  /api/jira/credentials:
    post:
      summary: Salva le credenziali JIRA per l'utente autenticato
      tags: [JIRA]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jiraEmail, jiraApiToken, jiraHost, jiraEncryptionKey]
              properties:
                jiraEmail:
                  type: string
                jiraApiToken:
                  type: string
                jiraHost:
                  type: string
                  example: https://pagopa.atlassian.net
                jiraEncryptionKey:
                  type: string
      responses:
        '200':
          description: Credenziali salvate con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: Parametri mancanti
        '500':
          description: Errore interno
    get:
      summary: Recupera info sulle credenziali JIRA (senza token)
      tags: [JIRA]
      responses:
        '200':
          description: Info credenziali trovate
          content:
            application/json:
              schema:
                type: object
                properties:
                  jiraEmail:
                    type: string
                  jiraHost:
                    type: string
                  hasToken:
                    type: boolean
        '404':
          description: Nessuna credenziale trovata
        '500':
          description: Errore interno

  /api/dora/deployment-frequency:
    get:
      summary: Calcola la Deployment Frequency
      tags: [DORA]
      parameters:
        - in: query
          name: projectKey
          required: true
          schema:
            type: string
        - in: query
          name: team
          required: false
          schema:
            type: string
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Deployment frequency calcolata con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  team:
                    type: string
                    nullable: true
                  projectKey:
                    type: string
                  from:
                    type: string
                    format: date
                    nullable: true
                  to:
                    type: string
                    format: date
                    nullable: true
                  deploymentFrequency:
                    type: integer
        '400':
          description: Parametri mancanti o non validi
        '401':
          description: Non autorizzato
        '404':
          description: Project key non trovato
        '500':
          description: Errore interno

  /api/dora/lead-time-epic:
    get:
      summary: Calcola il Lead Time for Changes delle epiche
      tags: [DORA]
      parameters:
        - in: query
          name: projectKey
          required: true
          schema:
            type: string
        - in: query
          name: team
          required: false
          schema:
            type: string
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Lead time calcolato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  team:
                    type: string
                    nullable: true
                  projectKey:
                    type: string
                  from:
                    type: string
                    format: date
                    nullable: true
                  to:
                    type: string
                    format: date
                    nullable: true
                  meanLeadTimeDays:
                    type: number
                    nullable: true
                  meanLeadTimeReadyForUAT:
                    type: number
                    nullable: true
                  epics:
                    type: array
                    items:
                      type: object
                  skippedEpics:
                    type: array
                    items:
                      type: object
        '400':
          description: Parametri mancanti o non validi
        '401':
          description: Non autorizzato
        '404':
          description: Project key non trovato
        '500':
          description: Errore interno

  /api/dora/change-failure-rate:
    get:
      summary: Calcola Change Failure Rate DORA e SEND
      tags: [DORA]
      parameters:
        - in: query
          name: projectKey
          required: true
          schema:
            type: string
          description: Project key JIRA
        - in: query
          name: team
          required: false
          schema:
            type: string
          description: Team opzionale
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date
          description: Data inizio (ISO 8601)
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date
          description: Data fine (ISO 8601)
      responses:
        '200':
          description: Change Failure Rate calcolato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  team:
                    type: string
                    nullable: true
                  projectKey:
                    type: string
                  from:
                    type: string
                    format: date
                    nullable: true
                  to:
                    type: string
                    format: date
                    nullable: true
                  dora:
                    type: object
                    properties:
                      totalDeployments:
                        type: integer
                      failedDeployments:
                        type: integer
                      changeFailureRate:
                        type: number
                        nullable: true
                  send:
                    type: object
                    properties:
                      totalDeployments:
                        type: integer
                      failedDeployments:
                        type: integer
                      hotfixReleases:
                        type: integer
                      changeFailureRate:
                        type: number
                        nullable: true
                  releases:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        releaseDate:
                          type: string
                          format: date
                        isGaRelease:
                          type: boolean
                        isHotfixRelease:
                          type: boolean
                        failureCount:
                          type: integer
                        failureIssues:
                          type: array
                          items:
                            type: object
                            properties:
                              key:
                                type: string
                              issueType:
                                type: string
                              created:
                                type: string
                                format: date
                  unmappedFailures:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        summary:
                          type: string
                          nullable: true
                        created:
                          type: string
                          format: date
                          nullable: true
                        reason:
                          type: string
        '400':
          description: Parametri mancanti o non validi
        '401':
          description: Credenziali JIRA non valide
        '404':
          description: Project key non trovato
        '500':
          description: Errore interno

  /api/dora/mean-time-to-restore:
    get:
      summary: Calcola Mean Time to Restore (MTTR) per SEND Prod BUG
      description: >-
        Per ogni issue [SEND] Bug Prod, resolutionDate usa fields.resolutiondate;
        se assente, viene derivata dal changelog prendendo la data dell'ultima
        transizione di stato a "Completata".
      tags: [DORA]
      parameters:
        - in: query
          name: projectKey
          required: true
          schema:
            type: string
          description: Project key JIRA
        - in: query
          name: team
          required: false
          schema:
            type: string
          description: Team opzionale
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date
          description: Data inizio (ISO 8601)
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date
          description: Data fine (ISO 8601)
      responses:
        '200':
          description: MTTR calcolato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  team:
                    type: string
                    nullable: true
                  projectKey:
                    type: string
                  from:
                    type: string
                    format: date
                    nullable: true
                  to:
                    type: string
                    format: date
                    nullable: true
                  mttrHours:
                    type: number
                    nullable: true
                  p50Hours:
                    type: number
                    nullable: true
                  p90Hours:
                    type: number
                    nullable: true
                  totalIncidents:
                    type: integer
                  resolvedIncidents:
                    type: integer
                  unresolvedIncidents:
                    type: integer
                  issues:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        summary:
                          type: string
                          nullable: true
                        created:
                          type: string
                        resolutionDate:
                          type: string
                          description: >-
                            Resolution date Jira o fallback da changelog (ultima
                            transizione stato a "Completata").
                        restoreHours:
                          type: number
                        issueType:
                          type: string
                          nullable: true
                        status:
                          type: string
                          nullable: true
                  skippedIssues:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        summary:
                          type: string
                          nullable: true
                        created:
                          type: string
                          nullable: true
                        reason:
                          type: string
        '400':
          description: Parametri mancanti o non validi
        '401':
          description: Credenziali JIRA non valide
        '404':
          description: Project key non trovato
        '500':
          description: Errore interno
