                    skippedEpics:
                      type: array
                      description: Epiche escluse dal calcolo per dati mancanti
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          summary:
                            type: string
                          created:
                            type: string
                            format: date
                          releaseDate:
                            type: string
                            format: date
                            nullable: true
                          readyForUATDate:
                            type: string
                            format: date
                            nullable: true
                          reason:
                            type: string
                            description: Motivo esclusione (es. mancano releaseDate e transizione READY_FOR_UAT)
  /api/dora/lead-time-epic:
    get:
      summary: Calcola il Lead Time for Changes delle epiche
      tags: [DORA]
      parameters:
        - in: query
          name: projectKey
          required: true
          schema:
            type: string
          description: Project key JIRA
        - in: query
          name: team
          required: false
          schema:
            type: string
          description: Nome team (opzionale)
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date
          description: Data inizio periodo (ISO 8601, opzionale)
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date
          description: Data fine periodo (ISO 8601, opzionale)
      responses:
        '200':
          description: Lead time calcolato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  team:
                    type: string
                    nullable: true
                  projectKey:
                    type: string
                  from:
                    type: string
                    format: date
                    nullable: true
                  to:
                    type: string
                    format: date
                    nullable: true
                  meanLeadTimeDays:
                    type: number
                  meanLeadTimeReadyForUAT:
                    type: number
                    nullable: true
                  epics:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        summary:
                          type: string
                        created:
                          type: string
                          format: date
                        releaseDate:
                          type: string
                          format: date
                          nullable: true
                        readyForUATDate:
                          type: string
                          format: date
                          nullable: true
                        leadTimeDays:
                          type: number
                        leadTimeReadyForUAT:
                          type: number
                          nullable: true
        '400':
          description: Parametri mancanti o non validi
        '401':
          description: Non autorizzato
        '500':
          description: Errore interno
openapi: 3.0.3
info:
  title: ProdBuddy Backend API
  version: 1.0.0
  description: API per la gestione delle integrazioni, credenziali e metriche DORA
servers:
  - url: http://localhost:3000
paths:
  /api/jira/credentials:
    post:
      summary: Salva le credenziali JIRA per l'utente autenticato
      tags: [JIRA]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - jiraEmail
                - jiraApiToken
                - jiraHost
              properties:
                jiraEmail:
                  type: string
                  example: user@email.com
                jiraApiToken:
                  type: string
                  example: atlassian-api-token
                jiraHost:
                  type: string
                  example: https://pagopa.atlassian.net
      responses:
        '200':
          description: Credenziali salvate con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: Parametri mancanti
        '500':
          description: Errore interno
    get:
      summary: Recupera info sulle credenziali JIRA (mai il token)
      tags: [JIRA]
      responses:
        '200':
          description: Info credenziali trovate
          content:
            application/json:
              schema:
                type: object
                properties:
                  jiraEmail:
                    type: string
                  jiraHost:
                    type: string
                  hasToken:
                    type: boolean
        '404':
          description: Nessuna credenziale trovata
        '500':
          description: Errore interno
